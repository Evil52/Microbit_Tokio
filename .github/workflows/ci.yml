name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  # Ручной запуск с опцией HIL: гоняется только когда есть self-hosted
  # runner с подключённой платой (метка [self-hosted, macOS, hil]).
  workflow_dispatch:
    inputs:
      run_hil:
        description: "Запустить HIL (нужен self-hosted runner с платой)"
        type: boolean
        default: false

# Отменяем устаревшие прогоны при новом пуше в ту же ветку.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings" # варнинги = ошибки в CI (прод-дисциплина)

jobs:
  # ── Гейт 1: формат ──────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Гейт 2: clippy host-крейтов (shared + web) ──────────────────
  clippy-host:
    name: clippy (shared + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p shared -p web --all-targets

  # ── Гейт 3: clippy firmware (thumbv7em, из firmware/) ───────────
  # БЕЗ --all-targets: no_std-крейт не имеет test-таргета (E0463 can't find `test`).
  # Запуск из firmware/ — там .cargo/config.toml ставит target (из корня = Mach-O err).
  clippy-firmware:
    name: clippy (firmware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy
        working-directory: firmware

  # ── Гейт 4: тесты host-крейтов (shared + web, std) ──────────────
  # web-тесты не требуют железа (фрейминг/gate/JSON — чистая логика);
  # игнорируемые тесты (реальный probe-rs) сюда не попадают.
  test:
    name: test (shared + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p shared -p web

  # ── Гейт 5: проверка no_std-сборки shared под thumbv7em ─────────
  # Гарантирует, что общий контракт реально собирается для embedded.
  build-shared-embedded:
    name: shared (no_std / thumbv7em)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p shared --target thumbv7em-none-eabihf

  # ── Гейт 6: сборка firmware (релизный ELF) ──────────────────────
  build-firmware:
    name: build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
        working-directory: firmware
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: target/thumbv7em-none-eabihf/release/firmware

  # ── Гейт 7: cargo-deny (лицензии / уязвимости / баны) ───────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Гейт 8 (опц.): HIL на self-hosted ARM64 runner ──────────────
  # Запускается ТОЛЬКО при ручном workflow_dispatch с галкой run_hil=true.
  # Это честнее, чем if:false: job не висит вечным "skipped" в каждом push,
  # а выполняется реально, когда ты сознательно жмёшь Run с подключённой платой.
  # Метка runner'а [self-hosted, macOS, hil] гарантирует, что job не уйдёт
  # на github-hosted раннер (где платы нет).
  hil:
    name: HIL (hardware-in-the-loop)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hil }}
    runs-on: [self-hosted, macOS, hil]
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware (release) and smoke tool
        run: |
          (cd firmware && cargo build --release)
          cargo build -p web --bin hil_smoke
      - name: Flash + reset + smoke
        run: |
          probe-rs download --chip nRF52833_xxAA target/thumbv7em-none-eabihf/release/firmware
          probe-rs reset --chip nRF52833_xxAA
          sleep 3
          ./target/debug/hil_smoke /dev/cu.usbmodem312102
