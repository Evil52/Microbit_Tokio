# cargo-deny: гейт лицензий / уязвимостей / банов (CI, Фаза 6).
[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"

[licenses]
# Подровняем под реальные транзитивные лицензии после первого прогона.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
